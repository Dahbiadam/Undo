<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UNDO - Analytics</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'Inter',sans-serif;}
body{background:#0f111a;color:#fff;display:flex;flex-direction:column;align-items:center;padding:2rem;min-height:100vh;}
header{width:100%;display:flex;justify-content:space-between;align-items:center;margin-bottom:2rem;}
.logo{font-weight:800;font-size:1.8rem;color:#fff;}
.menu{display:flex;gap:1.5rem;}
.menu-item{cursor:pointer;transition:0.3s;color:#ccc;}
.menu-item:hover{color:#a776ff;}
.menu-toggle{display:none;font-size:2rem;cursor:pointer;color:#6c63ff;}
h1{font-size:2rem;margin-bottom:0.5rem;text-align:center;}
h2{font-size:1.2rem;color:#ccc;margin-bottom:1rem;text-align:center;}

/* Charts */
canvas{background:#111;border-radius:10px;margin-bottom:2rem;max-width:90%;}

/* Quote frame */
.quote-frame{border:2px solid #6c63ff;padding:1rem;margin-top:1rem;border-radius:10px;width:80%;max-width:500px;text-align:center;font-style:italic;color:#ccc;font-size:1rem;}

/* Small screens */
@media(max-width:800px){
  .menu{display:none;flex-direction:column;gap:1rem;}
  .menu-toggle{display:block;}
}
</style>
</head>
<body>

<header>
  <div class="logo">UNDO</div>
  <div class="menu-toggle" id="menuToggle">&#9776;</div>
  <nav class="menu" id="menu">
    <div class="menu-item" onclick="window.location.href='dashboard.html'">Dashboard</div>
    <div class="menu-item" onclick="window.location.href='breathing.html'">Breathing</div>
    <div class="menu-item" onclick="window.location.href='analytics.html'">Analytics</div>
    <div class="menu-item" onclick="window.location.href='achievements.html'">Achievements</div>
    <div class="menu-item" onclick="window.location.href='settings.html'">Settings</div>  </nav>
</header>

<h1 id="welcomeMsg">Analytics Dashboard</h1>
<h2 id="goalMsg">Your Progress Overview</h2>

<canvas id="streakChart" height="150"></canvas>
<canvas id="urgesChart" height="150"></canvas>

<div class="quote-frame" id="dailyQuote">“Track your progress to stay motivated.”</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<script>
// Menu toggle
document.getElementById('menuToggle').addEventListener('click', ()=>{
  const menu = document.getElementById('menu');
  menu.style.display = menu.style.display==='flex'?'none':'flex';
});

// Load user
const loggedUser = JSON.parse(localStorage.getItem('user'));
if(!loggedUser){ window.location.href='onboarding.html'; }
const users = JSON.parse(localStorage.getItem('users')||'{}');
const currentUser = users[loggedUser.username];

// Welcome & goal
document.getElementById('welcomeMsg').textContent = `Welcome, ${loggedUser.username}`;
document.getElementById('goalMsg').textContent = `Goal: ${currentUser.goal || 30} days clean`;

// Generate streak data for chart
let streakData = currentUser.daysCompleted || [false,false,false,false,false,false,false];
let weekLabels = ['M','T','W','T','F','S','S'];
let weekValues = streakData.map(d=>d?1:0);

// Smooth monthly data
let monthData = Array(30).fill(0);
if(currentUser.history && currentUser.history.length){
  currentUser.history.forEach(entry=>{
    let dayIndex = new Date(entry.date).getDate()-1;
    monthData[dayIndex] = entry.completed ? 1 : 0;
  });
}

// Urges data
let urgesData = Array(30).fill(0);
if(currentUser.urges && currentUser.urges.length){
  currentUser.urges.forEach(entry=>{
    let dayIndex = new Date(entry.date).getDate()-1;
    urgesData[dayIndex] = entry.urges || 0;
  });
}

// Streak chart
const streakCtx = document.getElementById('streakChart').getContext('2d');
const streakChart = new Chart(streakCtx,{
  type:'bar',
  data:{
    labels: weekLabels,
    datasets:[{
      label:'Week Streak',
      data:weekValues,
      backgroundColor: weekValues.map(v=>v?'#6c63ff':'#444'),
      borderRadius:5
    }]
  },
  options:{
    responsive:true,
    plugins:{
      legend:{display:false},
      tooltip:{enabled:true}
    },
    scales:{
      y:{beginAtZero:true, max:1, ticks:{stepSize:1}}
    }
  }
});

// Urges chart
const urgesCtx = document.getElementById('urgesChart').getContext('2d');
const urgesChart = new Chart(urgesCtx,{
  type:'line',
  data:{
    labels:Array.from({length:30},(_,i)=>i+1),
    datasets:[{
      label:'Daily Urges',
      data:urgesData,
      borderColor:'#a776ff',
      backgroundColor:'rgba(108,99,255,0.2)',
      fill:true,
      tension:0.3,
      pointRadius:4,
      pointBackgroundColor:'#fff'
    }]
  },
  options:{
    responsive:true,
    plugins:{legend:{display:true}},
    scales:{y:{beginAtZero:true}}
  }
});

// Confetti on milestone
function checkMilestones(){
  const totalDays = streakData.reduce((a,b)=>a+b,0);
  if([5,10,15,30].includes(totalDays)){
    confetti({particleCount:80, spread:120, origin:{y:0.5}});
  }
}
checkMilestones();
</script>
</body>
</html>
