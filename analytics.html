<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UNDO - Analytics</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}
body{background:#f9f9f9;color:#222;display:flex;flex-direction:column;align-items:center;padding:2rem;min-height:100vh;transition:0.4s;}
:root.dark body{background:#0f111a;color:#fff;}
header{width:100%;display:flex;justify-content:space-between;align-items:center;margin-bottom:2rem;flex-wrap:wrap;}
.logo{font-size:1.5rem;font-weight:700;color:#6C63FF;}
.menu-toggle{font-size:2rem;cursor:pointer;display:none;color:#222;}
nav.menu{display:flex;gap:1rem;align-items:center;transition:0.3s;}
.menu-item{cursor:pointer;padding:0.5rem 1rem;border-radius:6px;transition:0.3s;}
.menu-item:hover{background:rgba(0,0,0,0.05);}
:root.dark nav.menu .menu-item:hover{background:rgba(255,255,255,0.05);}
canvas{background:transparent;border-radius:10px;margin-bottom:2rem;width:90%;max-width:600px;height:250px;}
.quote-frame{margin:2rem auto;padding:1rem;border-left:4px solid #6C63FF;font-style:italic;opacity:0.85;max-width:500px;text-align:center;}
</style>
</head>
<body>

<header>
  <div class="logo">UNDO</div>
  <div class="menu-toggle" id="menuToggle">&#9776;</div>
  <nav class="menu" id="menu">
    <div class="menu-item" onclick="window.location.href='dashboard.html'">Dashboard</div>
    <div class="menu-item" onclick="window.location.href='breathing.html'">Breathing</div>
    <div class="menu-item" onclick="window.location.href='analytics.html'">Analytics</div>
    <div class="menu-item" onclick="window.location.href='achievements.html'">Achievements</div>
    <div class="menu-item" onclick="window.location.href='settings.html'">Settings</div>
    <div class="menu-item" id="themeToggle">🌞</div>
  </nav>
</header>

<h1 id="welcomeMsg">Welcome</h1>
<h2 id="goalMsg">Your Progress Overview</h2>

<canvas id="streakChart"></canvas>
<canvas id="urgesChart"></canvas>
<canvas id="hourlyChart"></canvas>

<div class="quote-frame" id="dailyQuote">“Track your progress to stay motivated.”</div>

<script>
// ===== USER DATA =====
let loggedUser = JSON.parse(localStorage.getItem('user'));
if(!loggedUser){ 
  loggedUser = {username:'DemoUser'};
}
const users = JSON.parse(localStorage.getItem('users')||'{}');
const currentUser = users[loggedUser.username] || {
  goal:30,
  daysCompleted:[true,true,false,true,false,true,false],
  history:[{date:new Date(), completed:true}],
  urges:[{date:new Date(), urges:2}],
  hourly:Array(24).fill(0)
};

// Display real username
document.getElementById('welcomeMsg').textContent=`Welcome, ${loggedUser.username}`;
document.getElementById('goalMsg').textContent=`Goal: ${currentUser.goal || 30} days clean`;

// ===== THEME TOGGLE =====
const themeToggle=document.getElementById('themeToggle');
const savedTheme = localStorage.getItem('theme');
if(savedTheme==='dark'){document.documentElement.classList.add('dark'); themeToggle.textContent='🌞';}
themeToggle.addEventListener('click',()=>{
  document.documentElement.classList.toggle('dark');
  const isDark=document.documentElement.classList.contains('dark');
  themeToggle.textContent=isDark?'🌞':'🌙';
  localStorage.setItem('theme', isDark?'dark':'light');
});

// ===== SPARKLE EFFECT =====
const sparkles=[];
function addSparkle(chart,x,y){
  sparkles.push({x:x*chart.width, y:y*chart.height, alpha:1});
}
function drawSparkles(chart){
  const ctx=chart.ctx;
  ctx.save();
  ctx.globalCompositeOperation='lighter';
  sparkles.forEach((s,i)=>{
    ctx.fillStyle=`rgba(108,99,255,${s.alpha})`;
    ctx.beginPath();
    ctx.arc(s.x,s.y,2,0,Math.PI*2);
    ctx.fill();
    s.alpha-=0.02;
    if(s.alpha<=0)sparkles.splice(i,1);
  });
  ctx.restore();
}

// ===== STREAK CHART =====
const streakValues=currentUser.daysCompleted.map(d=>d?1:0);
const streakCtx=document.getElementById('streakChart').getContext('2d');
const streakChart=new Chart(streakCtx,{
  type:'bar',
  data:{
    labels:['M','T','W','T','F','S','S'],
    datasets:[{label:'Week Streak', data:streakValues, backgroundColor: streakValues.map(v=>v?'#6c63ff':'#ccc'), borderRadius:4}]
  },
  options:{responsive:true, plugins:{legend:{display:false}}, scales:{y:{beginAtZero:true,max:1,ticks:{stepSize:1}}}}
});

// ===== URGES CHART =====
const urgesData=Array(30).fill(0);
if(currentUser.urges)currentUser.urges.forEach(entry=>{
  const dayIndex=new Date(entry.date).getDate()-1;
  urgesData[dayIndex]=entry.urges;
});
const urgesCtx=document.getElementById('urgesChart').getContext('2d');
const urgesChart=new Chart(urgesCtx,{
  type:'line',
  data:{labels:Array.from({length:30},(_,i)=>i+1), datasets:[{label:'Daily Urges', data:urgesData, borderColor:'#6c63ff', backgroundColor:'rgba(108,99,255,0.15)', fill:true, tension:0.3, pointRadius:3, pointBackgroundColor:'#6c63ff'}]},
  options:{responsive:true, plugins:{legend:{display:false}}, scales:{y:{beginAtZero:true}}}
});

// ===== HOURLY CHART =====
const hourlyData=currentUser.hourly || Array(24).fill(0);
const hourlyCtx=document.getElementById('hourlyChart').getContext('2d');
const hourlyChart=new Chart(hourlyCtx,{
  type:'bar',
  data:{labels:Array.from({length:24},(_,i)=>i), datasets:[{label:'Hours Completed', data:hourlyData, backgroundColor: hourlyData.map(v=>v?'#00c896':'#ccc'), borderRadius:3}]},
  options:{responsive:true, plugins:{legend:{display:false}}, scales:{y:{beginAtZero:true,max:1,ticks:{stepSize:1}}}}
});

// ===== UPDATE HOURLY =====
function updateHourly(){
  const hour=new Date().getHours();
  if(hourlyData[hour]===0){
    hourlyData[hour]=1;
    hourlyChart.data.datasets[0].data[hour]=1;
    hourlyChart.data.datasets[0].backgroundColor[hour]='#00c896';
    hourlyChart.update();
    addSparkle(hourlyChart,hour/23,0.5);
    users[loggedUser.username]=currentUser;
    localStorage.setItem('users',JSON.stringify(users));
  }
}
setInterval(updateHourly,60*1000);
updateHourly();

// ===== TRAILING SPARKLE ANIMATION =====
function animateSparkles(){
  drawSparkles(streakChart);
  drawSparkles(urgesChart);
  drawSparkles(hourlyChart);
  requestAnimationFrame(animateSparkles);
}
animateSparkles();

// ===== INITIAL SPARKLES =====
streakValues.forEach((v,i)=>{if(v)addSparkle(streakChart,i/6,0.5);});
hourlyData.forEach((v,i)=>{if(v)addSparkle(hourlyChart,i/23,0.5);});
</script>
</body>
</html>
