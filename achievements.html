<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UNDO - Achievements</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'Inter',sans-serif;}
body{display:flex;flex-direction:column;align-items:center;min-height:100vh;padding:2rem;background:#0f111a;color:#fff;}
header{width:100%;display:flex;justify-content:space-between;align-items:center;margin-bottom:2rem;}
.logo{font-weight:800;font-size:2rem;color:#6C63FF;text-shadow:0 0 10px rgba(108,99,255,0.4);}
.menu{display:flex;gap:1rem;}
.menu-item{cursor:pointer;transition:0.3s;}
.menu-item:hover{color:#a776ff;}
h1{text-align:center;font-size:2.5rem;margin-bottom:1rem;text-shadow:0 0 10px rgba(255,255,255,0.2);}
.achievements-list{display:flex;flex-direction:column;gap:1rem;width:100%;max-width:500px;}
.achievement-card{background:#1c1f2a;padding:1rem 1.5rem;border-radius:15px;box-shadow:0 4px 20px rgba(108,99,255,0.3);cursor:pointer;transition:0.3s;}
.achievement-card:hover{background:#6C63FF;color:#fff;transform:scale(1.03);}
.empty-msg{text-align:center;color:#bbb;font-size:1.2rem;margin-top:2rem;}
@media(max-width:500px){.achievements-list{width:100%;}}
</style>
</head>
<body>

<header>
  <div class="logo">UNDO</div>
  <nav class="menu">
    <div class="menu-item" onclick="window.location.href='dashboard.html'">Dashboard</div>
    <div class="menu-item" onclick="window.location.href='breathing.html'">Breathing</div>
    <div class="menu-item" onclick="window.location.href='analytics.html'">Analytics</div>
    <div class="menu-item" onclick="window.location.href='achievements.html'">Achievements</div>
    <div class="menu-item" onclick="window.location.href='settings.html'">Settings</div>  </nav>
</header>

<h1>Achievements</h1>
<div class="achievements-list" id="achievementsList"></div>
<div class="empty-msg" id="emptyMsg">No achievements yet. Practice breathing to earn your first one!</div>

<script>
// Load achievements from localStorage
let achievements = JSON.parse(localStorage.getItem('achievements') || '[]');
const achievementsList = document.getElementById('achievementsList');
const emptyMsg = document.getElementById('emptyMsg');

if(achievements.length > 0){
    emptyMsg.style.display='none';
    achievements.forEach(a=>{
        const card = document.createElement('div');
        card.className='achievement-card';
        card.innerHTML = `<strong>${a.message}</strong><br>Duration: ${Math.floor(a.seconds/60)}m ${a.seconds%60}s<br>Date: ${a.date}`;
        card.addEventListener('click', ()=>{
            alert(`Achievement Details:\n${a.message}\nDuration: ${Math.floor(a.seconds/60)}m ${a.seconds%60}s\nDate: ${a.date}`);
        });
        achievementsList.appendChild(card);
    });
}
</script>

</body>
</html>
