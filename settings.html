<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>UNDO - Settings</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0f111a; --text:#fff; --accent:#6c63ff; --danger:#e74c3c; --card-bg:#111; --menu-bg:#0f111a; --menu-text:#fff;
}
:root.light {
  --bg:#f9f9f9; --text:#222; --accent:#00c896; --danger:#e74c3c; --card-bg:#eee; --menu-bg:#eee; --menu-text:#222;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}
body{background:var(--bg);color:var(--text);display:flex;flex-direction:column;align-items:center;padding:2rem;min-height:100vh;transition:0.4s;}
h1{text-align:center;margin-bottom:2rem;}
.container{width:90%;max-width:500px;display:flex;flex-direction:column;gap:1rem;}
.input{padding:0.6rem 1rem;border-radius:8px;border:1px solid #555;background:var(--card-bg);color:var(--text);transition:0.3s;}
.input:read-only{opacity:0.8;}
button{padding:0.8rem 1.2rem;border:none;border-radius:8px;background:var(--accent);color:#fff;cursor:pointer;transition:0.3s;}
button:hover{opacity:0.9;}
button#deleteBtn{background:var(--danger);}
header{width:100%;display:flex;justify-content:space-between;align-items:center;margin-bottom:2rem;flex-wrap:wrap;}
.logo{font-size:1.8rem;font-weight:700;color:var(--accent);}
.menu-toggle{font-size:2rem;cursor:pointer;display:none;color:var(--menu-text);}
nav.menu{display:flex;gap:1rem;align-items:center;transition:0.4s;}
.menu-item{cursor:pointer;padding:0.5rem 1rem;border-radius:8px;color:var(--menu-text);transition:0.3s;color 0.4s;}
.menu-item:hover{background:rgba(255,255,255,0.1);}
@media(max-width:768px){
  .menu-toggle{display:block;}
  nav.menu{position:fixed;top:0;right:-260px;flex-direction:column;width:240px;height:100vh;padding:4rem 1.5rem;background:var(--menu-bg);gap:1.2rem;opacity:0;pointer-events:none;}
  nav.menu.active{right:0;opacity:1;pointer-events:auto;}
}
#themeToggle{cursor:pointer;font-size:1.5rem;}
</style>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body>

<header>
  <div class="logo">UNDO</div>
  <div class="menu-toggle" id="menuToggle">&#9776;</div>
  <nav class="menu" id="menu">
    <div class="menu-item" onclick="window.location.href='dashboard.html'">Dashboard</div>
    <div class="menu-item" onclick="window.location.href='breathing.html'">Breathing</div>
    <div class="menu-item" onclick="window.location.href='analytics.html'">Analytics</div>
    <div class="menu-item" onclick="window.location.href='achievements.html'">Achievements</div>
    <div class="menu-item" onclick="window.location.href='settings.html'">Settings</div>
    <div class="menu-item" id="themeToggle">🌞</div>
  </nav>
</header>

<h1>Settings</h1>
<div class="container">
  <label for="username">Username</label>
  <input id="username" class="input" readonly>

  <label for="addiction">Addiction</label>
  <input id="addiction" class="input" readonly>

  <label for="goal">Goal (days)</label>
  <input id="goal" class="input" readonly>

  <label for="streak">Current Streak</label>
  <input id="streak" class="input" readonly>

  <div style="display:flex;gap:8px;margin-top:1rem">
    <button id="logoutBtn">Logout</button>
    <button id="deleteBtn">Delete Account</button>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
// ===== MENU TOGGLE =====
const menuToggle = document.getElementById('menuToggle');
const menu = document.getElementById('menu');
menuToggle.addEventListener('click',()=>menu.classList.toggle('active'));

// ===== DEMO USER DATA =====
const username = localStorage.getItem('user') || 'DemoUser';
const users = JSON.parse(localStorage.getItem('users')||'{}');
const cur = users[username] || {addiction:'Gaming',goal:30,streak:5};

document.getElementById('username').value = username;
document.getElementById('addiction').value = cur.addiction;
document.getElementById('goal').value = cur.goal;
document.getElementById('streak').value = cur.streak;

// ===== TOAST =====
function showToast(message){
  const toast = document.getElementById('toast');
  toast.textContent = message;
  toast.style.opacity='1';
  setTimeout(()=>{toast.style.opacity='0';},2000);
}

// ===== LOGOUT =====
document.getElementById('logoutBtn').addEventListener('click', ()=>{
  localStorage.removeItem('user');
  showToast('Logged out');
  setTimeout(()=>window.location.href='onboarding.html',500);
});

// ===== DELETE ACCOUNT =====
document.getElementById('deleteBtn').addEventListener('click', ()=>{
  if(!confirm('Delete account? This cannot be undone.')) return;
  delete users[username];
  localStorage.setItem('users',JSON.stringify(users));
  localStorage.removeItem('user');
  showToast('Account deleted');
  setTimeout(()=>window.location.href='onboarding.html',600);
});

// ===== DARK/LIGHT MODE =====
const themeToggle = document.getElementById('themeToggle');
const savedTheme = localStorage.getItem('theme');
if(savedTheme==='light'){document.documentElement.classList.add('light');themeToggle.textContent='🌙';}
else{themeToggle.textContent='🌞';}
themeToggle.addEventListener('click',()=>{
  const isLight = document.documentElement.classList.toggle('light');
  localStorage.setItem('theme',isLight?'light':'dark');
  themeToggle.textContent=isLight?'🌙':'🌞';
});
</script>
</body>
</html>
